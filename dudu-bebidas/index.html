    <!--
      Loading inicial (pré-React): puro HTML/CSS, aparece instantaneamente,
      antes até do JS carregar. Some sozinho assim que o React monta o app
      de verdade (createRoot substitui todo o conteúdo de #root) — não
      precisa de nenhum código pra "esconder" isso depois.
    -->
    <style>
      html, body {
        background: #0d0d0d;
      }
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #0d0d0d;
      }
      #initial-loader .spinner {
        width: 44px;
        height: 44px;
        border: 4px solid rgba(255, 215, 0, 0.15);
        border-top-color: #ffd700;
        border-radius: 50%;
        animation: initial-loader-spin 0.8s linear infinite;
      }
      #initial-loader .label {
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.02em;
      }
      @keyframes initial-loader-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="spinner"></div>
        <div class="label">Carregando...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
